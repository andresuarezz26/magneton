# GoReleaser config (Decision 17). Build/release with: goreleaser release --clean
version: 2
project_name: magneton

before:
  hooks:
    - go mod tidy

builds:
  - id: magneton
    binary: magneton
    main: .
    env:
      - CGO_ENABLED=0       # pure-Go sqlite driver → static binaries
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/andresuarezz26/magneton/cmd.version={{.Version}}

archives:
  - id: dist
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
  - id: raw
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: binary

checksum:
  name_template: "checksums.txt"

# Ad-hoc codesigning of the macOS binaries (set up notarization separately if needed).
# signs:
#   - artifacts: binary

brews:
  - name: magneton
    repository:
      owner: andresuarezz26
      name: homebrew-magneton
    homepage: "https://github.com/andresuarezz26/magneton"
    description: "Autonomous Android ticket → PR agent"
    license: "MIT"
    install: |
      bin.install "magneton"
    test: |
      system "#{bin}/magneton", "--version"

release:
  draft: false
